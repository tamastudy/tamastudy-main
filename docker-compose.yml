version: "3.8"
services:
  postgres:
    container_name: postgres
    image: "postgres:latest"
    restart: always
    env_file:
      - .env
  redis:
    container_name: redis
    image: "redis:latest"
    restart: always
    env_file:
      - .env
  nginx:
    container_name: nginx
    restart: always
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "3050:80"
  be:
    container_name: be
    build:
      context: ./be
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
  fe:
    container_name: fe
    build:
      context: ./fe
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env